<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSULTAS / EXAMES MARCADOS</title>

<style>

body{
background:#0b0b0b;
color:#fff;
font-family:Segoe UI;
margin:0;
padding:20px;
}

h1{
text-align:center;
font-size:22px;
}

.container{
max-width:700px;
margin:auto;
background:#121212;
padding:20px;
border-radius:12px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

input{
background:#1c1c1c;
color:white;
}

button{
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00e676;
}

.consulta{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:10px;
border-left:4px solid #00c853;
}

.excluir{
background:#ff4444;
}

.editar{
background:#2196f3;
}

.reagendar{
background:#ff9800;
}

.concluir{
background:#9c27b0;
}

.painel{
display:flex;
justify-content:space-between;
margin-bottom:15px;
background:#1a1a1a;
padding:10px;
border-radius:8px;
}

.botoes{
display:flex;
gap:8px;
margin-top:10px;
}

.botoes button{
flex:1;
padding:8px;
}

.linha-data-hora{
display:flex;
gap:10px;
}

.linha-data-hora input{
flex:1;
}

.abas{
display:flex;
gap:10px;
margin-bottom:10px;
}

.abas button{
flex:1;
background:#333;
}

.ativa{
background:#00c853;
}

</style>
</head>

<body>

<h1>📅 CONSULTAS / EXAMES</h1>

<div class="container">

<div class="painel">
<div>📊 Total: <span id="total">0</span></div>
<div>⏰ Próxima: <span id="proxima">Nenhuma</span></div>
</div>

<div class="abas">
<button id="abaAgendada" class="ativa" onclick="trocarAba('agendadas')">📅 Agendadas</button>
<button id="abaConcluida" onclick="trocarAba('concluidas')">✅ Concluídas</button>
</div>

<input type="text" id="pesquisa" placeholder="🔍 Pesquisar consulta" onkeyup="mostrar()">

<input type="text" id="nome" placeholder="Nome da consulta ou exame">
<input type="text" id="especialidade" placeholder="Especialidade">
<input type="text" id="hospital" placeholder="Hospital / Clínica">

<div class="linha-data-hora">
<input type="date" id="data">
<input type="time" id="hora">
</div>

<button onclick="salvarConsulta()">Salvar</button>

<div id="lista"></div>

</div>

<audio id="somAlarme">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>

let consultas = JSON.parse(localStorage.getItem("consultas")) || [];
let aba="agendadas";
let editando=-1;

function formatarData(data){
let p=data.split("-");
return p[2]+"/"+p[1]+"/"+p[0];
}

function salvarConsulta(){

let nome=nomeInput.value;
let esp=especialidade.value;
let hospital=hospitalInput.value;
let data=dataInput.value;
let hora=horaInput.value;

if(nome==""||data==""||hora==""||hospital==""){
alert("Preencha tudo");
return;
}

let obj={
nome,
esp,
hospital,
data,
hora,
status:"agendada",
alerta24:false,
alerta12:false
};

if(editando==-1){
consultas.push(obj);
}else{
consultas[editando]=obj;
editando=-1;
}

localStorage.setItem("consultas",JSON.stringify(consultas));

limpar();
mostrar();

}

function limpar(){
nomeInput.value="";
especialidade.value="";
hospitalInput.value="";
dataInput.value="";
horaInput.value="";
}

function trocarAba(tipo){

aba=tipo;

abaAgendada.classList.remove("ativa");
abaConcluida.classList.remove("ativa");

if(tipo=="agendadas") abaAgendada.classList.add("ativa");
if(tipo=="concluidas") abaConcluida.classList.add("ativa");

mostrar();

}

function mostrar(){

let lista=document.getElementById("lista");
let busca=pesquisa.value.toLowerCase();

lista.innerHTML="";

consultas.forEach((c,i)=>{

if(c.status!=aba) return;

if(!c.nome.toLowerCase().includes(busca)) return;

lista.innerHTML+=`

<div class="consulta">

<b>${c.nome}</b><br>

👨‍⚕️ ${c.esp}<br>
🏥 ${c.hospital}<br>
📅 ${formatarData(c.data)} ⏰ ${c.hora}

<div class="botoes">

<button class="editar" onclick="editar(${i})">Editar</button>

<button class="reagendar" onclick="editar(${i})">Reagendar</button>

<button class="excluir" onclick="excluir(${i})">Excluir</button>

${aba=="agendadas" ? `<button class="concluir" onclick="concluir(${i})">Concluir</button>`:""}

</div>

</div>

`;

});

atualizarPainel();

}

function excluir(i){

consultas.splice(i,1);

localStorage.setItem("consultas",JSON.stringify(consultas));

mostrar();

}

function editar(i){

let c=consultas[i];

nomeInput.value=c.nome;
especialidade.value=c.esp;
hospitalInput.value=c.hospital;
dataInput.value=c.data;
horaInput.value=c.hora;

editando=i;

}

function concluir(i){

consultas[i].status="concluidas";

localStorage.setItem("consultas",JSON.stringify(consultas));

mostrar();

}

function atualizarPainel(){

let agendadas=consultas.filter(c=>c.status=="agendada");

total.innerText=agendadas.length;

if(agendadas.length>0){

agendadas.sort((a,b)=>new Date(a.data+" "+a.hora)-new Date(b.data+" "+b.hora));

proxima.innerText=formatarData(agendadas[0].data)+" "+agendadas[0].hora;

}else{

proxima.innerText="Nenhuma";

}

}

mostrar();

</script>

</body>
</html>
</script>

</body>
</html>
